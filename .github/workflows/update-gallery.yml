name: Update Gallery Manifest

on:
  push:
    paths:
      - 'images/galerie/**'
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          python3 << 'PYEOF'
          import os, json

          CATEGORIES = {
            'flotte':      { 'fr': 'Notre flotte',   'en': 'Our fleet' },
            'port':        { 'fr': 'Port de Kribi',  'en': 'Port of Kribi' },
            'operations':  { 'fr': 'Opérations',     'en': 'Operations' },
            'equipes':     { 'fr': 'Nos équipes',    'en': 'Our teams' },
            'partenaires': { 'fr': 'Partenaires',    'en': 'Partners' },
          }

          EXTENSIONS = {'.jpg', '.jpeg', '.png', '.webp'}

          manifest = { 'categories': [], 'photos': [] }

          for cat_key, cat_labels in CATEGORIES.items():
            folder = f'images/galerie/{cat_key}'
            if not os.path.isdir(folder):
              continue
            manifest['categories'].append({
              'key':   cat_key,
              'fr':    cat_labels['fr'],
              'en':    cat_labels['en'],
            })
            files = sorted([
              f for f in os.listdir(folder)
              if os.path.splitext(f)[1].lower() in EXTENSIONS
            ])
            for fname in files:
              name_no_ext = os.path.splitext(fname)[0]
              label = name_no_ext.replace('-', ' ').replace('_', ' ').title()
              manifest['photos'].append({
                'src':      f'{folder}/{fname}',
                'category': cat_key,
                'title_fr': label,
                'title_en': label,
                'sub_fr':   cat_labels['fr'],
                'sub_en':   cat_labels['en'],
              })

          with open('manifest.json', 'w', encoding='utf-8') as f:
            json.dump(manifest, f, ensure_ascii=False, indent=2)

          print(f"manifest.json généré : {len(manifest['photos'])} photos")
          PYEOF

      - name: Commit manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "🖼️ Auto-update gallery manifest"
          git push
